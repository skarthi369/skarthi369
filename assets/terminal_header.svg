<svg width="820" height="150" viewBox="0 0 820 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip1"><rect x="76" y="0" width="0" height="150">
      <animate attributeName="width"
        values="0;408;408;0;0;0;0;0;0;0"
        keyTimes="0;0.0444;0.2444;0.2889;0.3333;1"
        dur="9s" repeatCount="indefinite"/>
    </rect></clipPath>
    <clipPath id="clip2"><rect x="76" y="0" width="0" height="150">
      <animate attributeName="width"
        values="0;0;336;336;0;0;0"
        keyTimes="0;0.3333;0.3778;0.5778;0.6222;0.6667;1"
        dur="9s" repeatCount="indefinite"/>
    </rect></clipPath>
    <clipPath id="clip3"><rect x="76" y="0" width="0" height="150">
      <animate attributeName="width"
        values="0;0;576;576;0;0"
        keyTimes="0;0.6667;0.7111;0.9111;0.9556;1"
        dur="9s" repeatCount="indefinite"/>
    </rect></clipPath>
    <linearGradient id="termbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
  </defs>

  <!-- terminal window -->
  <rect x="4" y="4" width="812" height="142" rx="12" fill="url(#termbg)" stroke="#1d9e75" stroke-width="1"/>

  <!-- title bar -->
  <rect x="4" y="4" width="812" height="30" rx="12" fill="#111820"/>
  <rect x="4" y="20" width="812" height="14" fill="#111820"/>
  <circle cx="24" cy="19" r="5" fill="#e2544a"/>
  <circle cx="42" cy="19" r="5" fill="#f2a623"/>
  <circle cx="60" cy="19" r="5" fill="#28e07a"/>
  <text x="410" y="24" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#5f6c78">
    karthikeyan@security-ai: ~
  </text>

  <!-- prompt -->
  <text x="30" y="90" font-family="Consolas, Menlo, monospace" font-size="20" fill="#28e07a">$</text>

  <!-- typewriter phrases (stacked, revealed by clip-path in sequence) -->
  <g clip-path="url(#clip1)">
    <text x="76" y="90" font-family="Consolas, Menlo, monospace" font-size="20" fill="#e6f1fb">AI/ML Engineer | Python Developer</text>
  </g>
  <g clip-path="url(#clip2)">
    <text x="76" y="90" font-family="Consolas, Menlo, monospace" font-size="20" fill="#4dd8ff">Generative AI / LLM Engineer</text>
  </g>
  <g clip-path="url(#clip3)">
    <text x="76" y="90" font-family="Consolas, Menlo, monospace" font-size="20" fill="#f2a623">Building LLM-Powered Security &amp; Vision Systems</text>
  </g>

  <!-- blinking cursor -->
  <rect x="720" y="74" width="11" height="20" fill="#28e07a">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- status line -->
  <text x="30" y="122" font-family="Consolas, Menlo, monospace" font-size="12" fill="#3d4a55">
    B.Tech AI &amp; Data Science · CDAC LLM Security Research · ICACT 2026 Published
  </text>
</svg>
