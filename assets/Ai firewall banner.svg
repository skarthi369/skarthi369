<svg width="900" height="270" viewBox="0 0 900 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#0b1622"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1d9e75"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="270" rx="14" fill="url(#bg)"/>

  <!-- faint grid texture -->
  <g stroke="#12324a" stroke-width="0.5" opacity="0.5">
    <path d="M0,40 H900 M0,220 H900"/>
    <path d="M120,20 V250 M420,20 V250 M720,20 V250"/>
  </g>

  <!-- title -->
  <text x="30" y="34" font-family="Consolas, Menlo, monospace" font-size="17" fill="#4dd8ff" font-weight="bold">
    KARTHIKEYAN S <tspan fill="#5f6c78">// LLM-Powered Security &amp; Vision Systems</tspan>
  </text>
  <circle cx="866" cy="30" r="5" fill="#28e07a">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="878" y="34" font-family="Consolas, monospace" font-size="11" fill="#28e07a">LIVE</text>

  <!-- pipeline path (single flow line all nodes sit on) -->
  <path id="flow" d="M75,150 L890,150" stroke="#173042" stroke-width="2" fill="none"/>
  <path d="M75,150 L890,150" stroke="#1d9e75" stroke-width="2" fill="none"
        stroke-dasharray="6 10" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- nodes -->
  <!-- 1 Traffic -->
  <g filter="url(#glow)">
    <rect x="10" y="120" width="130" height="60" rx="10" fill="#0d2233" stroke="#1d9e75" stroke-width="1"/>
  </g>
  <text x="75" y="146" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#e6f1fb" font-weight="bold">Network</text>
  <text x="75" y="162" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#8fa6b8">Traffic</text>

  <!-- 2 Feature extraction -->
  <g filter="url(#glow)">
    <rect x="185" y="120" width="150" height="60" rx="10" fill="#0d2233" stroke="#1d9e75" stroke-width="1"/>
  </g>
  <text x="260" y="146" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#e6f1fb" font-weight="bold">Feature</text>
  <text x="260" y="162" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#8fa6b8">Extraction</text>

  <!-- 3 Hybrid retrieval -->
  <g filter="url(#glow)">
    <rect x="380" y="112" width="180" height="76" rx="10" fill="#0d2233" stroke="#37c2ff" stroke-width="1"/>
  </g>
  <text x="470" y="138" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#e6f1fb" font-weight="bold">Hybrid Retrieval</text>
  <text x="470" y="154" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8fa6b8">embeddings + keyword</text>
  <text x="470" y="168" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8fa6b8">threat intel context</text>

  <!-- 4 LLM classifier -->
  <g filter="url(#glow)">
    <rect x="605" y="112" width="150" height="76" rx="10" fill="#0d2233" stroke="#f2a623" stroke-width="1.2"/>
  </g>
  <text x="680" y="140" text-anchor="middle" font-family="Consolas, monospace" font-size="12" fill="#e6f1fb" font-weight="bold">LLM</text>
  <text x="680" y="156" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#8fa6b8">Classifier</text>
  <circle cx="680" cy="112" r="3" fill="#f2a623">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.4s"/>
  </circle>

  <!-- 5 decision / dashboard -->
  <g filter="url(#glow)">
    <rect x="785" y="120" width="105" height="60" rx="10" fill="#0d2233" stroke="#e2544a" stroke-width="1"/>
  </g>
  <text x="837" y="146" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#e6f1fb" font-weight="bold">Block /</text>
  <text x="837" y="162" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#8fa6b8">Allow</text>

  <!-- traveling packets along the flow line -->
  <circle r="5" fill="#4dd8ff" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0s">
      <mpath href="#flow"/>
    </animateMotion>
  </circle>
  <circle r="5" fill="#28e07a" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.1s">
      <mpath href="#flow"/>
    </animateMotion>
  </circle>
  <circle r="5" fill="#f2a623" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="2.1s">
      <mpath href="#flow"/>
    </animateMotion>
  </circle>

  <!-- footer strip -->
  <text x="30" y="252" font-family="Consolas, monospace" font-size="11" fill="#4a5a68">
    autonomous intrusion detection &amp; prevention  ·  embedding-based semantic analysis  ·  Docker · REST APIs
  </text>
</svg>
